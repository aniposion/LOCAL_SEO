# Google Cloud Build configuration
steps:
  # Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'
      - '.'

  # Push Backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-seo-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'APP_ENV=prod,DATABASE_URL=${_DATABASE_URL}'
      - '--set-secrets'
      - 'JWT_SECRET=jwt-secret:latest,STRIPE_SECRET_KEY=stripe-secret:latest,OPENAI_API_KEY=openai-key:latest'

  # Build Frontend
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    dir: 'frontend'
    entrypoint: npm
    args: ['run', 'build']
    env:
      - 'NEXT_PUBLIC_API_URL=https://local-seo-backend-${_REGION}-run.app'

  # Build Frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'

  # Push Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-seo-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

substitutions:
  _REGION: 'us-central1'
  _DATABASE_URL: ''

images:
  - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'
  - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/local-seo-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
