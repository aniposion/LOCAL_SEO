# Google Cloud Build configuration
steps:
  # Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'
      - '.'

  # Push Backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-seo-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'APP_ENV=prod,DATABASE_URL=${_DATABASE_URL},AUTH_COOKIE_PATH=${_AUTH_COOKIE_PATH},EMAIL_FROM=${_EMAIL_FROM},SENDGRID_FROM_EMAIL=${_SENDGRID_FROM_EMAIL},TWILIO_PHONE_NUMBER=${_TWILIO_PHONE_NUMBER},GCS_BUCKET=${_GCS_BUCKET},GCS_PROJECT_ID=${_GCS_PROJECT_ID},LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL}'
      - '--set-secrets'
      - '${_RUNTIME_SECRET_BINDINGS}'

  # Deploy dedicated scheduler worker to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-seo-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--command'
      - 'python'
      - '--args'
      - '-m,app.worker'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--no-cpu-throttling'
      - '--set-env-vars'
      - 'APP_ENV=prod,DATABASE_URL=${_DATABASE_URL},SCHEDULER_ENABLED=true,SCHEDULER_TARGET=all,AUTH_COOKIE_PATH=${_AUTH_COOKIE_PATH},EMAIL_FROM=${_EMAIL_FROM},SENDGRID_FROM_EMAIL=${_SENDGRID_FROM_EMAIL},TWILIO_PHONE_NUMBER=${_TWILIO_PHONE_NUMBER},GCS_BUCKET=${_GCS_BUCKET},GCS_PROJECT_ID=${_GCS_PROJECT_ID},LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL}'
      - '--set-secrets'
      - '${_RUNTIME_SECRET_BINDINGS}'

  # Resolve the deployed backend URL for frontend build-time configuration
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run services describe local-seo-backend \
          --region "${_REGION}" \
          --format='value(status.url)' > /workspace/backend_url.txt
        test -s /workspace/backend_url.txt

  # Build Frontend
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        NEXT_PUBLIC_API_URL="$(cat /workspace/backend_url.txt)" npm run build

  # Build Frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        BACKEND_URL="$(cat /workspace/backend_url.txt)"
        docker build \
          -t "gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA" \
          -t "gcr.io/$PROJECT_ID/local-seo-frontend:latest" \
          -f frontend/Dockerfile \
          --build-arg "NEXT_PUBLIC_API_URL=$BACKEND_URL" \
          frontend

  # Push Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-seo-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # Resolve the deployed frontend URL and close APP_URL on backend + worker.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run services describe local-seo-frontend \
          --region "${_REGION}" \
          --format='value(status.url)' > /workspace/frontend_url.txt
        FRONTEND_URL="$(cat /workspace/frontend_url.txt)"
        APP_URL="${_APP_URL}"
        if [ -z "$APP_URL" ]; then
          APP_URL="$FRONTEND_URL"
        fi
        test -n "$APP_URL"
        gcloud run services update local-seo-backend \
          --region "${_REGION}" \
          --update-env-vars "APP_URL=$APP_URL"
        gcloud run services update local-seo-worker \
          --region "${_REGION}" \
          --update-env-vars "APP_URL=$APP_URL"

substitutions:
  _REGION: 'us-central1'
  _DATABASE_URL: ''
  _APP_URL: ''
  _AUTH_COOKIE_PATH: '/'
  _EMAIL_FROM: 'noreply@localseo.app'
  _SENDGRID_FROM_EMAIL: 'billing@localseo.app'
  _TWILIO_PHONE_NUMBER: ''
  _GCS_BUCKET: ''
  _GCS_PROJECT_ID: ''
  _LLM_PROVIDER: 'gemini'
  _LLM_MODEL: 'gemini-1.5-pro'
  _RUNTIME_SECRET_BINDINGS: 'JWT_SECRET=jwt-secret:latest,STRIPE_SECRET_KEY=stripe-secret:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,OPENAI_API_KEY=openai-key:latest,GEMINI_API_KEY=gemini-key:latest,TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,GBP_CLIENT_ID=gbp-client-id:latest,GBP_CLIENT_SECRET=gbp-client-secret:latest,IG_APP_ID=ig-app-id:latest,IG_APP_SECRET=ig-app-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/local-seo-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/local-seo-backend:latest'
  - 'gcr.io/$PROJECT_ID/local-seo-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/local-seo-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
