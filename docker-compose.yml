version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+psycopg2://seo:seopassword@db:5432/seo_optimizer
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-min-32-chars
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+psycopg2://seo:seopassword@db:5432/seo_optimizer
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-min-32-chars
      - SCHEDULER_ENABLED=true
      - SCHEDULER_TARGET=all
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=seo
      - POSTGRES_PASSWORD=seopassword
      - POSTGRES_DB=seo_optimizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seo_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
